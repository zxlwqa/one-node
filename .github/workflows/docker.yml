name: 推送Docker镜像

on:
  push:
    branches: [ main ]
    paths:
      - 'hugging-face/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 登录 GitHub Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: ./hugging-face
          push: true
          tags: |
            ghcr.io/zxlwq/lwq:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lwq:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
