<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🐳 在线文生图服务</title>
  <style>
    :root{
      --bg:#0b1220;--panel:#0f172a;--muted:#94a3b8;--text:#e2e8f0;--primary:#60a5fa;--accent:#a78bfa;--ok:#34d399
    }
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Noto Sans",sans-serif;color:var(--text);background:radial-gradient(1200px 600px at 10% -10%,#1e293b,transparent),radial-gradient(1200px 600px at 110% 10%,#0f172a,transparent),var(--bg)}
    a{color:var(--primary);text-decoration:none}
    .container{max-width:980px;margin:0 auto;padding:24px}
    .header{display:flex;align-items:center;gap:12px;margin:8px 0 20px}
    .badge{background:linear-gradient(135deg,var(--primary),var(--accent));color:#0b1220;border-radius:12px;padding:6px 10px;font-weight:700}
    h1{font-size:22px;margin:0}
    .grid{display:grid;grid-template-columns:1fr;gap:16px}
    @media(min-width:900px){.grid{grid-template-columns:1fr 1fr}}
    .panel{background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.01));border:1px solid rgba(148,163,184,.18);border-radius:14px;padding:16px}
    .title{font-size:16px;margin:0 0 10px;color:#cbd5e1}
    .row{display:flex;align-items:center;justify-content:space-between;border-top:1px dashed rgba(148,163,184,.18);padding:10px 0}
    .row:first-of-type{border-top:none}
    label{color:var(--muted);font-size:14px}
    input,select{width:220px;background:#0b1220;border:1px solid rgba(148,163,184,.25);border-radius:8px;color:var(--text);padding:8px 10px}
    .hint{color:var(--muted);font-size:12px;margin-top:6px}
    .actions{display:flex;gap:10px;margin-top:12px}
    .btn{background:linear-gradient(135deg,var(--primary),var(--accent));border:none;border-radius:10px;color:#0b1220;font-weight:700;padding:10px 14px;cursor:not-allowed;opacity:.7}
    .result{display:flex;flex-direction:column;gap:10px}
    .box{background:#0b1220;border:1px solid rgba(148,163,184,.25);border-radius:10px;padding:12px;min-height:48px;color:var(--muted)}
    .muted{color:var(--muted);font-size:13px}
    .footer{margin-top:20px;text-align:center;color:var(--muted);font-size:12px}
  </style>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="badge">🐳</div>
      <h1>在线文生图服务</h1>
    </div>

    <div class="grid">
      <section class="panel">
        <h2 class="title">基本设置</h2>
        <div class="row"><label>随机提示词</label><input placeholder=""></div>
        <div class="row"><label>访问密码</label><input placeholder=""></div>
        <div class="row"><label>正向提示词</label><input value="cyberpunk cat"></div>
        <div class="row"><label>反向提示词</label><input placeholder=""></div>
        <div class="row"><label>文生图模型</label><select><option>加载中...</option></select></div>
        <div class="row"><label>输入图像URL</label><input placeholder="必填"></div>
        <div class="row"><label>遮罩图像URL</label><input placeholder="必填（inpainting）"></div>
        <div class="actions"><button class="btn" disabled>生成图像</button></div>
        <div class="hint">此为静态演示页面，用于占位与健康检查。</div>
      </section>

      <section class="panel">
        <h2 class="title">高级选项</h2>
        <div class="row"><label>图像宽度</label><input value="1024px"></div>
        <div class="row"><label>图像高度</label><input value="1024px"></div>
        <div class="row"><label>迭代步数</label><input value="20"></div>
        <div class="row"><label>引导系数</label><input value="7.5"></div>
        <div class="row"><label>随机种子</label><input placeholder="留空则随机"></div>
      </section>
    </div>

    <section class="panel" style="margin-top:16px">
      <h2 class="title">生成结果</h2>
      <div class="actions">
        <button class="btn" disabled>复制参数</button>
        <button class="btn" disabled>下载图像</button>
        <button class="btn" disabled>下载ZIP</button>
      </div>
      <div class="box">生成中，请稍候... 0% 估算（静态占位）</div>
      <div class="result">
        <div class="box">状态</div>
        <div class="box">生成时间：- · 使用模型：- · 算力估计：- (it/s) · 输出大小：-</div>
      </div>
      <div class="muted">点击生成按钮开始创建图像（演示按钮已禁用）。</div>
    </section>

    <div class="footer">© Hugging Face Spaces</div>
  </div>
</body>
</html>
